services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: edufika
      MARIADB_USER: edufika
      MARIADB_PASSWORD: edufika
    volumes:
      - edufika_mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpass
    ports:
      - "${PHPMYADMIN_HOST_PORT:-18089}:80"

volumes:
  edufika_mariadb_data:
