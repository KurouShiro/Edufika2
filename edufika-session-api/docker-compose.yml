services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: edufika
      MARIADB_USER: edufika
      MARIADB_PASSWORD: edufika
    volumes:
      - edufika_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    expose:
      - "8091"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8091/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  website:
    build:
      context: ../new_design
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      website:
        condition: service_healthy
    ports:
      - "8091:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpass
    ports:
      - "${PHPMYADMIN_HOST_PORT:-18089}:80"

volumes:
  edufika_mariadb_data:
